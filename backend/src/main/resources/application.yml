server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  application:
    name: Yukihon

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/yukihon?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
        ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:true}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,metrics}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:when_authorized}
      probes:
        enabled: true
  info:
    env:
      enabled: true

jwt:
  secret: ${JWT_SECRET:ZGV2LWxvY2FsLWp3dC1zZWNyZXQtZm9yLXl1a2lob24tYXBwLTIwMjY=}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 phút
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 ngày

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  base-url: ${BASE_URL:http://localhost:8080}
  media-upload-dir: ${MEDIA_UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173}}
  auth:
    expose-reset-token: ${AUTH_EXPOSE_RESET_TOKEN:true}
  # Per-IP token-bucket rate limits (requests/minute). Protects against login brute-force
  # and abuse of the expensive AI/translation endpoints.
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-capacity-per-minute: ${RATE_LIMIT_AUTH:10}
    ai-capacity-per-minute: ${RATE_LIMIT_AI:30}
  # Dictionary: example sentences (Tatoeba) + self-hosted JMdict word lookup.
  dictionary:
    examples-limit: ${DICT_EXAMPLES_LIMIT:6}
    external-enabled: ${DICT_EXTERNAL_ENABLED:true}
    jmdict:
      url: ${JMDICT_URL:}
  # Dev default: seed demo users + sample content on first run. Prod overrides to false
  # (application-prod.yml). Disable in dev with SEED_ENABLED=false. Idempotent (skips when data exists).
  seed:
    enabled: ${SEED_ENABLED:true}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
